{% extends "base.html" %}
{% block title %}AI Assistant{% endblock %}
{% block content %}
<h2>Ask the AI Assistant</h2>
<div class="card">
    <div class="card-body" style="height: 400px; overflow-y: scroll;" id="chatBox">
        <div class="mb-2"><strong>Bot:</strong> Hello! How can I help you today?</div>
    </div>
    <div class="card-footer">
        <div class="input-group">
            <input type="text" id="userMessage" class="form-control" placeholder="Type your question...">
            <button class="btn btn-primary" onclick="sendMessage()">Send</button>
        </div>
    </div>
</div>
<script>
function sendMessage() {
    let msg = document.getElementById('userMessage').value;
    if (!msg.trim()) return;
    let chat = document.getElementById('chatBox');
    chat.innerHTML += '<div class="mb-2 text-end"><strong>You:</strong> ' + msg + '</div>';
    document.getElementById('userMessage').value = '';

    fetch('{{ url_for("chatbot_page") }}', {
        method: 'POST',
        headers: {'Content-Type': 'application/x-www-form-urlencoded'},
        body: 'message=' + encodeURIComponent(msg)
    })
    .then(res => res.json())
    .then(data => {
        chat.innerHTML += '<div class="mb-2"><strong>Bot:</strong> ' + data.reply + '</div>';
        chat.scrollTop = chat.scrollHeight;
    })
    .catch(err => {
        chat.innerHTML += '<div class="mb-2 text-danger">Error connecting to bot.</div>';
    });
}
</script>
{% endblock %}
