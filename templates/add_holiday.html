{% extends "base.html" %}

{% block title %}Manage Holidays{% endblock %}

{% block content %}
<h2 class="mb-4">Manage Holidays</h2>

<div class="row">
    <div class="col-md-5">
        <div class="card">
            <div class="card-header bg-primary text-white">
                <h5 class="mb-0">Add Holiday</h5>
            </div>
            <div class="card-body">
                <form method="POST">
                    <div class="mb-3">
                        <label for="holiday_date" class="form-label">Date</label>
                        <input type="date" class="form-control" id="holiday_date" name="holiday_date" required>
                    </div>
                    <div class="mb-3">
                        <label for="name" class="form-label">Holiday Name</label>
                        <input type="text" class="form-control" id="name" name="name" required>
                    </div>
                    <div class="mb-3">
                        <label for="type" class="form-label">Type</label>
                        <select class="form-control" id="type" name="type" required>
                            <option value="university">University</option>
                            <option value="department">Department</option>
                        </select>
                    </div>
                    <button type="submit" class="btn btn-success">Add Holiday</button>
                </form>
            </div>
        </div>
    </div>
    
    <div class="col-md-7">
        <div class="card">
            <div class="card-header bg-info text-white">
                <h5 class="mb-0">Upcoming Holidays</h5>
            </div>
            <div class="card-body">
                <table class="table table-striped">
                    <thead>
                        <tr>
                            <th>Date</th>
                            <th>Name</th>
                            <th>Type</th>
                        </tr>
                    </thead>
                    <tbody>
                        {% for holiday in holidays %}
                        <tr>
                            <td>{{ holiday.holiday_date.strftime('%d %b %Y') }}</td>
                            <td>{{ holiday.name }}</td>
                            <td><span class="badge bg-secondary">{{ holiday.type }}</span></td>
                        </tr>
                        {% endfor %}
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>
{% endblock %}
